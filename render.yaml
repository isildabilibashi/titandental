services:
  - type: web
    name: titandent-backend
    env: python
    rootDir: ./backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: RESEND_API_KEY
        sync: false

  - type: static
    name: titandent-frontend
    rootDir: ./titan-dental-connect-main
    plan: free
    buildCommand: npm install && npm run build
    publishDirectory: ./dist