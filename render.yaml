services:
  - type: web
    name: titandent
    env: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      npm install
      cd titan-dental-connect-main && npm run build
    startCommand: python -m gunicorn --bind 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_APP_PASSWORD
        sync: false